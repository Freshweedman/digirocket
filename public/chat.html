<html lang="pt-BR">
<head>

    {
      "@context": "https://schema.org",

      "mainEntity": [

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #1a1a1a;
            --accent: #FF3B00;
            --accent2: #FF6B35;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.5);
            --bubble-ai: #1e1e1e;
            --bubble-user: #FF3B00;
            --border: rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .phone {
            width: 390px;
            height: 844px;
            background: var(--bg);
            border-radius: 44px;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px 4px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .status-bar .right { display: flex; gap: 6px; align-items: center; }
        .status-bar .right svg { width: 16px; height: 16px; }

        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .chat-header .back { color: var(--accent); font-size: 22px; cursor: pointer; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            color: #fff;
            position: relative;
            flex-shrink: 0;
        }
        .avatar .online-dot {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid var(--bg);
        }
        .header-info { flex: 1; }
        .header-info .name { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 4px; }
        .header-info .status { font-size: 12px; color: #22c55e; font-weight: 500; display: flex; align-items: center; gap: 4px; }
        .header-info .status::before { content: ''; width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }
        .header-actions { display: flex; gap: 16px; }
        .header-actions span { font-size: 18px; cursor: pointer; opacity: 0.5; }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }
        .messages::-webkit-scrollbar { display: none; }

        .msg {
            display: flex;
            gap: 8px;
            max-width: 82%;
            animation: msgIn 0.3s ease-out;
        }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.ai { align-self: flex-start; }

        .msg .avatar-sm {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
            color: #fff;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg.ai .bubble {
            background: var(--bubble-ai);
            border: 1px solid var(--border2);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        .msg.user .bubble {
            background: var(--bubble-user);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg .time {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            padding: 0 4px;
        }
        .msg.user .time { text-align: right; }

        /* Typing */
        .typing { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
        .typing .dot {
            width: 7px;
            height: 7px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing .dot:nth-child(3) { animation-delay: 0.4s; }

        /* Quick Replies */
        .quick-replies {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            animation: fadeUp 0.4s ease-out;
        }
        .quick-replies::-webkit-scrollbar { display: none; }
        .quick-btn {
            white-space: nowrap;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border2);
            background: var(--surface2);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .quick-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .quick-btn:active { transform: scale(0.95); }

        /* Input */
        .input-area {
            padding: 12px 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface);
        }
        .input-area .emoji { font-size: 22px; cursor: pointer; padding-bottom: 6px; }
        .input-area textarea {
            flex: 1;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 22px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            line-height: 1.4;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area textarea:focus { border-color: var(--accent); }
        .input-area textarea::placeholder { color: var(--muted); }
        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .send-btn svg { width: 18px; height: 18px; fill: #fff; }

        /* Animations */
        @keyframes msgIn {
            from { opacity: 0; transform: scale(0.85) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile */
        @media (max-width: 430px) {
            body { align-items: stretch; }
            .phone { width: 100vw; height: 100vh; border-radius: 0; border: none; box-shadow: none; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="phone">
        <!-- Status Bar -->
        <div class="status-bar">
            <span id="clock">9:41</span>
            <div class="right">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
            </div>
        </div>

        <!-- Header -->
        <div class="chat-header">
            <span class="back" onclick="window.history.back()">‹</span>
            <div class="avatar">
                DR
                <span class="online-dot"></span>
            </div>
            <div class="header-info">
                <div class="name">Rocket ⚡ <span style="font-weight:400;font-size:12px;color:var(--muted)">DigiRocket</span></div>
                <div class="status">Online agora</div>
            </div>
            <div class="header-actions">
                <span>📞</span>
                <span>⋮</span>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages"></div>

        <!-- Quick Replies -->
        <div class="quick-replies" id="quickReplies">
            <button class="quick-btn" onclick="sendQuick('Quanto custa?')">💰 Ver preços</button>
            <button class="quick-btn" onclick="sendQuick('Como funciona?')">🚀 Como funciona?</button>
            <button class="quick-btn" onclick="sendQuick('Quero ver exemplos de sites')">📱 Ver exemplos</button>
            <button class="quick-btn" onclick="sendQuick('Qual o prazo de entrega?')">⚡ Prazo</button>
            <button class="quick-btn" onclick="sendQuick('Tem garantia?')">🛡️ Garantia</button>
        </div>

        <!-- Input -->
        <div class="input-area">
            <span class="emoji">😊</span>
            <textarea id="input" rows="1" placeholder="Mensagem..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        // Config
        const API_KEY = ''; // Coloque sua API key aqui
        const MODEL = 'claude-sonnet-4-20250514';
        const SYSTEM_PROMPT = `Você é o Rocket, assistente virtual de vendas da DigiRocket — agência que cria sites profissionais em 48 horas a partir de R$497 (pagamento único, sem mensalidade).

MISSÃO: Fechar vendas via conversa. Seja direto, simpático e humano — como um amigo especialista.

REGRAS:
- Respostas CURTAS (máx 3 linhas). Use quebras de linha.
- Nunca use markdown (sem **, ##, listas com -)
- Seja caloroso, use emojis com moderação (1-2 por mensagem)
- Sempre direcione para o WhatsApp no final: https://wa.me/5551984689725
- Quando perguntar sobre preço: Plano Essencial R$497 (1 página, pronto em 48h) / Plano Premium R$997 (várias páginas, hospedagem vitalícia)
- Quando cliente mostrar interesse: passe o link do WhatsApp com urgência (só 2 vagas/semana)
- Serviços: sites, redes sociais, anúncios Google/Meta, WhatsApp automático, logo, vídeos
- Garantia 7 dias com devolução total
- Atendemos todo o Brasil, 100% remoto

OBJEÇÕES COMUNS:
- "Caro": compare com agências que cobram R$2.500-5.000 com mensalidade
- "Não preciso": pergunte se ele perde clientes pra concorrência no Google
- "Depois": diga que só há 2 vagas essa semana

NUNCA invente dados, preços ou funcionalidades além do que está descrito acima.`;

        let history = [];
        let isTyping = false;

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }
        updateClock();
        setInterval(updateClock, 30000);

        // Auto resize textarea
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        // Handle keyboard
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Get time string
        function getTime() {
            return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        // Add message to UI
        function addMessage(text, role) {
            const container = document.getElementById('messages');
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;

            if (role === 'ai') {
                msg.innerHTML = `
                    <div class="avatar-sm">DR</div>
                    <div>
                        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
                        <div class="time">${getTime()}</div>
                    </div>
                `;
            } else {
                msg.innerHTML = `
                    <div>
                        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
                        <div class="time">${getTime()}</div>
                    </div>
                `;
            }

            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // Show typing indicator
        function showTyping() {
            const container = document.getElementById('messages');
            const typing = document.createElement('div');
            typing.className = 'msg ai';
            typing.id = 'typing-indicator';
            typing.innerHTML = `
                <div class="avatar-sm">DR</div>
                <div class="bubble typing">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            `;
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // Show/hide quick replies
        function showQuickReplies() {
            document.getElementById('quickReplies').classList.remove('hidden');
        }
        function hideQuickReplies() {
            document.getElementById('quickReplies').classList.add('hidden');
        }

        // Send quick reply
        function sendQuick(text) {
            document.getElementById('input').value = text;
            sendMessage();
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || isTyping) return;

            // Add user message
            addMessage(text, 'user');
            history.push({ role: 'user', content: text });
            input.value = '';
            input.style.height = 'auto';
            hideQuickReplies();

            // Disable send
            isTyping = true;
            document.getElementById('sendBtn').disabled = true;

            // Show typing
            showTyping();

            try {
                let reply;

                if (API_KEY) {
                    // Real API call
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': API_KEY,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerous-direct-browser-access': 'true'
                        },
                        body: JSON.stringify({
                            model: MODEL,
                            max_tokens: 300,
                            system: SYSTEM_PROMPT,
                            messages: history
                        })
                    });
                    const data = await response.json();
                    reply = data.content[0].text;
                } else {
                    // Fallback sem API key - respostas locais
                    reply = getFallbackReply(text);
                    await new Promise(r => setTimeout(r, 1000 + Math.random() * 1500));
                }

                hideTyping();
                addMessage(reply, 'ai');
                history.push({ role: 'assistant', content: reply });

            } catch (err) {
                hideTyping();
                const fallback = 'Ops, tive um probleminha técnico 😅\nMas posso te atender agora pelo WhatsApp: https://wa.me/5551984689725';
                addMessage(fallback, 'ai');
                history.push({ role: 'assistant', content: fallback });
            }

            isTyping = false;
            document.getElementById('sendBtn').disabled = false;
            showQuickReplies();
        }

        // Fallback replies (quando não tem API key)
        function getFallbackReply(text) {
            const t = text.toLowerCase();

            if (t.includes('preço') || t.includes('preco') || t.includes('valor') || t.includes('custa') || t.includes('quanto')) {
                return 'Temos dois planos 🚀\n\nEssencial: R$497 (1 página, pronto em 48h)\nPremium: R$997 (várias páginas, hospedagem vitalícia)\n\nPagamento único, sem mensalidade. Qual te interessa? Posso te passar mais detalhes no WhatsApp: https://wa.me/5551984689725';
            }
            if (t.includes('funciona') || t.includes('como') || t.includes('processo')) {
                return 'Super simples! 🎯\n\nVocê manda 3 fotos + nome do negócio pelo WhatsApp. Em 48h o site tá pronto. Você aprova antes de ir ao ar.\n\nBora? https://wa.me/5551984689725';
            }
            if (t.includes('prazo') || t.includes('tempo') || t.includes('demora')) {
                return '48 horas úteis ⚡\n\nVocê recebe o rascunho pra aprovar. Uma rodada de ajustes inclusa. Só vai ao ar quando você aprovar.\n\nQuer começar hoje? https://wa.me/5551984689725';
            }
            if (t.includes('garantia') || t.includes('devol')) {
                return 'Garantia total de 7 dias 🛡️\n\nSe não gostar, devolvemos 100% do valor. Sem burocracia. Mas spoiler: ninguém devolveu ainda 😄\n\nhttps://wa.me/5551984689725';
            }
            if (t.includes('exemplo') || t.includes('portfolio') || t.includes('ver')) {
                return 'Temos +200 sites entregues! 🎨\n\nDelivery, barbearia, salão, consultoria, loja, cursos... Posso te mandar exemplos do seu nicho no WhatsApp.\n\nMe chama lá: https://wa.me/5551984689725';
            }
            if (t.includes('whatsapp') || t.includes('falar') || t.includes('contato') || t.includes('humano')) {
                return 'Bora conversar! 💬\n\nClica aqui e me chama direto: https://wa.me/5551984689725\n\nRespondo em menos de 5 minutos 🚀';
            }
            if (t.includes('obrigad') || t.includes('valeu') || t.includes('vlw')) {
                return 'Por nada! 😊\n\nQuando quiser dar o próximo passo, me chama no WhatsApp que a gente resolve rapidinho: https://wa.me/5551984689725\n\nBoa sorte com o negócio! 🚀';
            }

            return 'Entendi! 👍\n\nPosso te ajudar melhor pelo WhatsApp, onde mando exemplos, preços certinhos e a gente fecha o briefing rapidinho.\n\nMe chama lá: https://wa.me/5551984689725';
        }

        // Initial message
        setTimeout(() => {
            const intro = 'Oi! 👋 Sou o Rocket, da DigiRocket.\n\nSeu negócio já aparece no Google? Em 48h a gente coloca você lá — a partir de R$497, pago uma vez só.\n\nComo posso te ajudar?';
            addMessage(intro, 'ai');
            history.push({ role: 'assistant', content: intro });
        }, 500);
    </script>
</body>
</html>
